aid: bookingcom
name: Booking.com
description: >-
  Booking.com is the world's leading online travel platform for accommodations, offering
  over 28 million listings including hotels, apartments, villas, homes, and unique places
  to stay. Part of Booking Holdings, Booking.com provides APIs for affiliate partners and
  connectivity partners to integrate its extensive travel inventory into third-party
  applications and property management systems.
